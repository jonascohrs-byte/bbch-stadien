<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BBCH-Stadien Obstbau</title><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--cream:#F5F0E8;--cream-dark:#EDE6D6;--green-deep:#2D4A2D;--green-mid:#4A7C4A;--green-light:#E8F0E8;--brown:#8B6914;--brown-light:#F5EDD8;--text:#1C1C1A;--text-mid:#5A5A52;--text-muted:#9A9A8E;--border:#D8D0C0;--border-light:#EDE8DE;--white:#FFFFFF;--shadow-sm:0 1px 3px rgba(45,74,45,.07),0 1px 2px rgba(45,74,45,.05);--shadow-md:0 4px 12px rgba(45,74,45,.10),0 2px 4px rgba(45,74,45,.06);--shadow-hover:0 8px 20px rgba(45,74,45,.13),0 3px 6px rgba(45,74,45,.08);--radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-xl:18px}body{font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;background:var(--cream);color:var(--text);min-height:100vh}.site-header{background:var(--green-deep);padding:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.18)}.header-inner{max-width:1400px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:64px}.header-logo{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;cursor:pointer;title:"Klicken zum Logo austauschen"}.header-logo img{width:100%;height:100%;object-fit:cover}.header-logo svg{opacity:0.7}.header-text{flex:1;min-width:0}.header-title{font-size:17px;font-weight:600;color:#fff;letter-spacing:0.01em;line-height:1.2}.header-sub{font-size:11px;color:rgba(255,255,255,0.55);margin-top:1px;letter-spacing:0.03em;text-transform:uppercase}.header-year{display:flex;align-items:center;gap:8px;flex-shrink:0}.year-label{font-size:12px;color:rgba(255,255,255,0.55);white-space:nowrap}.year-select{padding:5px 10px;border:1px solid rgba(255,255,255,0.2);border-radius:var(--radius-sm);font-size:13px;font-weight:500;background:rgba(255,255,255,0.10);color:#fff;cursor:pointer;appearance:auto}.year-select option{background:var(--green-deep);color:#fff}.year-select:focus{outline:none;border-color:rgba(255,255,255,0.4)}.edit-hint{font-size:11px;color:rgba(255,255,255,0.35);cursor:pointer;padding:4px 8px;border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius-sm);white-space:nowrap;transition:all .15s}.edit-hint:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6)}.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center}.modal-bg.open{display:flex}.modal{background:var(--white);border-radius:var(--radius-xl);padding:1.75rem;width:360px;max-width:90vw;box-shadow:var(--shadow-md)}.modal h2{font-size:15px;font-weight:600;margin-bottom:1rem;color:var(--green-deep)}.modal label{display:block;font-size:12px;color:var(--text-mid);margin-bottom:3px;margin-top:12px}.modal input[type=text]{width:100%;padding:7px 10px;border:0.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;color:var(--text);background:var(--cream)}.modal input[type=text]:focus{outline:none;border-color:var(--green-mid)}.modal-btns{display:flex;gap:8px;margin-top:1.25rem;justify-content:flex-end}.btn-save{padding:7px 18px;background:var(--green-deep);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;cursor:pointer}.btn-save:hover{background:var(--green-mid)}.btn-cancel{padding:7px 14px;background:transparent;color:var(--text-mid);border:0.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;cursor:pointer}.main{max-width:1400px;margin:0 auto;padding:1.5rem}.tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;border-bottom:1.5px solid var(--border);padding-bottom:0}.tab{padding:8px 18px 9px;border:1px solid transparent;border-bottom:none;border-radius:var(--radius-md) var(--radius-md) 0 0;font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:var(--text-muted);display:flex;align-items:center;gap:7px;transition:all .15s;position:relative;top:1.5px}.tab:hover{color:var(--text);background:var(--cream-dark)}.tab.active{background:var(--white);color:var(--text);border-color:var(--border);border-bottom-color:var(--white)}.tab-overview{margin-left:auto;border-style:dashed!important;color:var(--green-mid)!important}.tab-overview.active{background:var(--green-light)!important;border-color:var(--green-mid)!important;border-bottom-color:var(--green-light)!important}.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}.filters{display:flex;gap:7px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}.fbtn{padding:5px 14px;border:1px solid var(--border);border-radius:999px;font-size:12px;font-weight:500;cursor:pointer;background:var(--white);color:var(--text-mid);transition:all .12s}.fbtn:hover{border-color:var(--green-mid);color:var(--green-mid)}.fbtn.active{background:var(--green-deep);color:#fff;border-color:var(--green-deep)}.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:1.1rem}.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted)}.legdot{width:9px;height:9px;border-radius:3px;flex-shrink:0}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px}.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .2s;cursor:pointer}.card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px)}.card-img{background:var(--cream);padding:16px 14px;display:flex;align-items:center;justify-content:center;min-height:136px;border-bottom:1px solid var(--border-light)}.card-img img{max-height:110px;max-width:100%;object-fit:contain}.card-body{padding:11px 13px 5px}.card-code{font-family:"SF Mono","Fira Mono",monospace;font-size:24px;font-weight:700;line-height:1;margin-bottom:4px}.card-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}.card-phase{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:999px;letter-spacing:0.01em}.card-frost{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:999px;margin-top:5px;margin-left:4px}.card-desc{font-size:11px;color:var(--text-mid);line-height:1.6;margin-top:7px;padding-bottom:2px}.note-toggle{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);margin:8px 13px 0;padding:7px 0;border-top:1px solid var(--border-light);cursor:pointer;user-select:none;transition:color .15s}.note-toggle:hover{color:var(--green-mid)}.note-toggle svg{flex-shrink:0;transition:transform .2s}.note-toggle.open svg{transform:rotate(180deg)}.note-dot{width:7px;height:7px;border-radius:50%;background:var(--green-mid);flex-shrink:0;display:none}.note-dot.visible{display:inline-block}.note-wrap{display:none;padding:10px 13px 13px;border-top:1px solid var(--border-light);background:var(--green-light)}.note-wrap.open{display:block}.note-year{font-size:10px;font-weight:600;color:var(--green-mid);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}.note-ta{width:100%;font-size:12px;font-family:-apple-system,sans-serif;padding:7px 9px;border:1px solid #C8D8C8;border-radius:var(--radius-sm);background:var(--white);color:var(--text);resize:vertical;min-height:64px;line-height:1.55;transition:border-color .15s}.note-ta:focus{outline:none;border-color:var(--green-mid)}.note-ta::placeholder{color:#B8C8B8}.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;width:80px;height:80px;border-radius:var(--radius-md);border:1.5px dashed var(--border);color:var(--border)}.frost-note{margin-top:1.5rem;font-size:12px;color:#7A5F00;line-height:1.7;background:#FFFBE6;border:1px solid #FFE57A;border-radius:var(--radius-md);padding:10px 14px;display:none}.ov-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm)}.ov-card-header{padding:12px 16px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border-light);background:var(--cream)}.ov-card-title{font-size:14px;font-weight:600;color:var(--text)}.ov-count{margin-left:auto;font-size:11px;color:var(--text-muted);background:var(--cream-dark);padding:2px 8px;border-radius:999px}.ov-row{padding:11px 16px;border-top:1px solid var(--border-light);display:flex;gap:12px;align-items:flex-start}.ov-row:first-of-type{border-top:none}.ov-code{font-family:"SF Mono","Fira Mono",monospace;font-size:15px;font-weight:700;width:32px;flex-shrink:0;padding-top:1px}.ov-content{flex:1;min-width:0}.ov-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}.ov-note-text{font-size:12px;color:var(--text-mid);line-height:1.6;white-space:pre-wrap;background:var(--green-light);border:1px solid #C8D8C8;border-radius:var(--radius-sm);padding:7px 10px;margin-top:4px}.ov-jump{font-size:10px;color:var(--text-muted);margin-top:5px;cursor:pointer;text-align:right;user-select:none;transition:color .15s}.ov-jump:hover{color:var(--green-mid)}.empty-state{padding:3rem 0;text-align:center;color:var(--text-muted);font-size:13px}</style><link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAALQAAAC0CAIAAACyr5FlAAABCGlDQ1BJQ0MgUHJvZmlsZQAAeJxjYGA8wQAELAYMDLl5JUVB7k4KEZFRCuwPGBiBEAwSk4sLGHADoKpv1yBqL+viUYcLcKakFicD6Q9ArFIEtBxopAiQLZIOYWuA2EkQtg2IXV5SUAJkB4DYRSFBzkB2CpCtkY7ETkJiJxcUgdT3ANk2uTmlyQh3M/Ck5oUGA2kOIJZhKGYIYnBncAL5H6IkfxEDg8VXBgbmCQixpJkMDNtbGRgkbiHEVBYwMPC3MDBsO48QQ4RJQWJRIliIBYiZ0tIYGD4tZ2DgjWRgEL7AwMAVDQsIHG5TALvNnSEfCNMZchhSgSKeDHkMyQx6QJYRgwGDIYMZAKbWPz9HbOBQAACB/klEQVR42uz9d7gk13Ufiu5YuTr3yWkyZjCDwQwAEiByJMBMihIlWVa0nCTL8tV7V5St77vXvnp6tq+jnGRf2aairUCJlJgDCJAEBoM0OZ4558zJp3N35aqd3h89OHMmYgaJIJ/31998Z6qrq6v3XrX2Wr/1W2vBuDcNXhsQwqv+vXEoCa9/wg2Oa338mt+r1PpbUsr1k5VS659a/+91hoIbvkiq/pU3fgsAAG64E4jQlde88ib       .pdf-header { background: #2D4A2D; color: #fff; padding: 18px 24px; margin-bottom: 24px; }
      .pdf-header h1 { font-size: 20px; margin: 0 0 4px; }
      .pdf-header p { font-size: 12px; margin: 0; opacity: 0.7; }
      .pdf-section { margin: 0 24px 28px; break-inside: avoid; }
      .pdf-section-title { font-size: 15px; font-weight: 700; color: #2D4A2D; border-bottom: 2px solid #2D4A2D; padding-bottom: 5px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
      .pdf-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
      table { width: 100%; border-collapse: collapse; font-size: 12px; }
      th { background: #F5F0E8; text-align: left; padding: 6px 10px; font-weight: 600; color: #5A5A52; border-bottom: 1px solid #D8D0C0; }
      td { padding: 7px 10px; vertical-align: top; border-bottom: 1px solid #EDE8DE; }
      td:first-child { font-family: monospace; font-weight: 700; font-size: 14px; width: 45px; }
      td:nth-child(2) { width: 140px; font-weight: 600; }
      td:nth-child(3) { width: 80px; }
      .phase-badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 999px; font-weight: 500; }
      .note-cell { color: #2D4A2D; background: #E8F0E8; border-radius: 4px; padding: 4px 7px; line-height: 1.5; }
      .empty { color: #aaa; font-style: italic; }
      @media print { @page { margin: 15mm; } }
    </style>`;

  if (mode === 'year') {
    // Alle Kulturen des aktuellen Jahres
    html += `<div class="pdf-header"><h1>BBCH-Stadien Notizen · ${year}</h1><p>Alle Kulturen · Cohrs Hofladen</p></div>`;
    for (const cr of cropKeys) {
      const entries = [];
      for (const s of crops[cr].stages) {
        const val = getNote(year, cr, s.code);
        if (val && val.trim()) entries.push({s, val: val.trim()});
      }
      if (entries.length === 0) continue;
      const pc_map = {};
      const rows = entries.map(({s, val}) => {
        const pc = phaseColors[s.phase] || {bg:'#eee',col:'#333'};
        return `<tr><td>${s.code}</td><td>${s.name}</td><td><span class="phase-badge" style="background:${pc.bg};color:${pc.col}">${s.phase}</span></td><td><div class="note-cell">${val.split('\n').join('<br>')}</div></td></tr>`;
      }).join('');
      html += `<div class="pdf-section"><div class="pdf-section-title"><span class="pdf-dot" style="background:${crops[cr].color}"></span>${labels[cr]} · ${entries.length} Eintrag${entries.length>1?'e':''}</div><table><thead><tr><th>Code</th><th>Stadium</th><th>Phase</th><th>Notiz</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }
    if (html.indexOf('<table>') === -1) html += '<p style="padding:24px;color:#aaa">Keine Notizen für ' + year + ' vorhanden.</p>';
  } else {
    // Aktuelle Kultur über alle Jahre
    const cr = crop;
    html += `<div class="pdf-header"><h1>BBCH-Stadien Notizen · ${labels[cr]}</h1><p>Alle Jahre · Cohrs Hofladen</p></div>`;
    for (const yr of years) {
      const entries = [];
      for (const s of crops[cr].stages) {
        const val = getNote(yr, cr, s.code);
        if (val && val.trim()) entries.push({s, val: val.trim()});
      }
      if (entries.length === 0) continue;
      const rows = entries.map(({s, val}) => {
        const pc = phaseColors[s.phase] || {bg:'#eee',col:'#333'};
        return `<tr><td>${s.code}</td><td>${s.name}</td><td><span class="phase-badge" style="background:${pc.bg};color:${pc.col}">${s.phase}</span></td><td><div class="note-cell">${val.split('\n').join('<br>')}</div></td></tr>`;
      }).join('');
      html += `<div class="pdf-section"><div class="pdf-section-title">${yr} · ${entries.length} Eintrag${entries.length>1?'e':''}</div><table><thead><tr><th>Code</th><th>Stadium</th><th>Phase</th><th>Notiz</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }
    if (html.indexOf('<table>') === -1) html += '<p style="padding:24px;color:#aaa">Keine Notizen für ' + labels[cr] + ' vorhanden.</p>';
  }

  const win = window.open('', '_blank');
  win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>BBCH Export</title>' + style + '</head><body>' + html + '<scr'+'ipt>window.onload=function(){window.print();}<\/script></body></html>');
  win.document.close();
}
